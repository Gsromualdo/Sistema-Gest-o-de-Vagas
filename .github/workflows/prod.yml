name: Gestao de vagas application

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: "maven"

      - name: Build project
        run: mvn clean install -DskipTests

      - name: Login docker
        if: success()
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push docker image
        if: success()
        uses: docker/build-push-action@v5 # Melhor prática usar a action oficial
        with:
          context: .
          push: true
          tags: gsromualdo/gestao_vagas:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull image docker hub
        run: docker pull gsromualdo/gestao_vagas:latest

      - name: Stop and Remove old container
        # Adicionei o 'stop' antes do 'rm' para garantir uma finalização limpa
        run: |
          docker stop gestao-vagas || true
          docker rm -f gestao-vagas || true

      - name: Run docker container gestao-vagas
        run: |
          docker run -d -p 8080:8080 \
          -e DATABASE_URL='${{secrets.DATABASE_URL}}' \
          -e DATABASE_PASSWORD='${{secrets.DATABASE_PASSWORD}}' \
          -e DATABASE_USERNAME='${{secrets.DATABASE_USERNAME}}' \
          --name gestao-vagas gsromualdo/gestao_vagas:latest